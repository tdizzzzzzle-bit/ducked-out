<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — Duck & Cover</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">
      <img src="Gerald.svg" alt="Duck & Cover" class="nav-duck" />
      <span>Duck & Cover</span>
    </a>
    <div class="nav-links">
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
    </div>
    <button class="nav-toggle" onclick="toggleNav()">☰</button>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="shop.html" onclick="toggleNav()">Shop</a>
    <a href="about.html" onclick="toggleNav()">About</a>
  </div>

  <div class="container product-page" id="productPage">
    <p>Loading...</p>
  </div>

  <section class="related-section">
    <div class="container">
      <h2>More Like This</h2>
      <div class="product-grid" id="relatedGrid"></div>
    </div>
  </section>

  <footer>
    <div class="container footer-inner">
      <a href="index.html" class="footer-logo">Duck & Cover</a>
      <p>© <span id="year"></span> Duck & Cover. All ducks reserved.</p>
      <div class="footer-links">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
      </div>
    </div>
  </footer>

  <script src="products.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    function toggleNav() {
      document.getElementById('mobileMenu').classList.toggle('open');
    }

    // ── Admin mode: add ?admin=quack to URL ──
    const urlParams = new URLSearchParams(window.location.search);
    const IS_ADMIN  = urlParams.get('admin') === 'quack';
    const productId = urlParams.get('id');

    const SHIRT_COLORS = [
      { name: 'White',        hex: '#FFFFFF' },
      { name: 'Black',        hex: '#222222' },
      { name: 'Navy',         hex: '#1B2A4A' },
      { name: 'Heather Grey', hex: '#9B9B9B' },
      { name: 'Red',          hex: '#C41230' },
      { name: 'Forest Green', hex: '#2D5A27' },
      { name: 'Maroon',       hex: '#6B1F2E' },
      { name: 'Royal Blue',   hex: '#1A58A5' },
      { name: 'Yellow',       hex: '#F5C842' },
      { name: 'Pink',         hex: '#F2A7BB' },
    ];

    // ── Image layers ──
    const shirtImg = new Image();
    const armsImg  = new Image();
    shirtImg.src   = 'model_shirt.png';
    armsImg.src    = 'model_arms.png';

    function hexToRgb(hex) {
      return [
        parseInt(hex.slice(1,3), 16),
        parseInt(hex.slice(3,5), 16),
        parseInt(hex.slice(5,7), 16),
      ];
    }

    function renderMockup(hex) {
      const canvas = document.getElementById('shirtCanvas');
      if (!canvas || !armsImg.naturalWidth) return;
      const ctx = canvas.getContext('2d');
      canvas.width  = armsImg.naturalWidth;
      canvas.height = armsImg.naturalHeight;

      // Layer 1: arms
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(armsImg, 0, 0, canvas.width, canvas.height);

      // Layer 2: recolored shirt
      const off    = document.createElement('canvas');
      off.width    = shirtImg.naturalWidth;
      off.height   = shirtImg.naturalHeight;
      const offCtx = off.getContext('2d');
      offCtx.drawImage(shirtImg, 0, 0);
      const imgData = offCtx.getImageData(0, 0, off.width, off.height);
      const d = imgData.data;
      const [tr, tg, tb] = hexToRgb(hex);
      for (let i = 0; i < d.length; i += 4) {
        if (d[i+3] < 10) continue;
        const b = (d[i] + d[i+1] + d[i+2]) / (255 * 3);
        d[i]   = Math.min(255, Math.round(tr * b));
        d[i+1] = Math.min(255, Math.round(tg * b));
        d[i+2] = Math.min(255, Math.round(tb * b));
      }
      offCtx.putImageData(imgData, 0, 0);
      ctx.drawImage(off, 0, 0, canvas.width, canvas.height);
    }

    function setShirtColor(hex, name) {
      document.getElementById('colorLabel').textContent = name;
      document.querySelectorAll('.color-swatch').forEach(s => {
        s.classList.toggle('active', s.dataset.hex === hex);
      });
      renderMockup(hex);
    }

    // ── Admin controls ──
    function updateDesign() {
      const design = document.getElementById('shirtDesign');
      if (!design) return;
      const size = document.getElementById('sliderSize').value;
      const x    = document.getElementById('sliderX').value;
      const y    = document.getElementById('sliderY').value;
      design.style.width = size + '%';
      design.style.left  = x + '%';
      design.style.top   = y + '%';
      document.getElementById('labelSize').textContent = size + '%';
      document.getElementById('labelX').textContent    = x + '%';
      document.getElementById('labelY').textContent    = y + '%';
      document.getElementById('adminOutput').textContent =
        'placement: { size: ' + size + ', x: ' + x + ', y: ' + y + ' }';
    }

    function serializeProducts(arr) {
      const rows = arr.map(function(p) {
        return '  {\n'
          + '    id: "' + p.id + '",\n'
          + '    name: "' + p.name + '",\n'
          + '    shortDescription: "' + p.shortDescription.replace(/"/g, '\\"') + '",\n'
          + '    description: "' + p.description.replace(/"/g, '\\"') + '",\n'
          + '    price: ' + p.price + ',\n'
          + '    image: "' + p.image + '",\n'
          + '    stripeLink: "' + p.stripeLink + '",\n'
          + '    placement: { size: ' + p.placement.size + ', x: ' + p.placement.x + ', y: ' + p.placement.y + ' },\n'
          + '  }';
      });
      return 'const products = [\n' + rows.join(',\n') + ',\n];\n';
    }

    async function exportUpdate(pid) {
      const size = parseInt(document.getElementById('sliderSize').value);
      const x    = parseInt(document.getElementById('sliderX').value);
      const y    = parseInt(document.getElementById('sliderY').value);
      const updated = products.map(function(p) {
        return p.id === pid ? Object.assign({}, p, { placement: { size: size, x: x, y: y } }) : p;
      });
      const zip  = new JSZip();
      zip.file('products.js', serializeProducts(updated));
      const blob = await zip.generateAsync({ type: 'blob' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = 'duck-update-' + pid + '.zip';
      a.click();
      URL.revokeObjectURL(url);
      const btn = document.getElementById('exportBtn');
      btn.textContent = '✓ Downloaded!';
      btn.style.background = '#2D5A27';
      btn.style.color = 'white';
      setTimeout(function() {
        btn.textContent = '⬇ Export Update';
        btn.style.background = '';
        btn.style.color = '';
      }, 2000);
    }

    // ── Image load handling ──
    var imagesReady = 0;
    function imageLoaded() {
      imagesReady++;
      if (imagesReady >= 2) renderMockup('#FFFFFF');
    }
    shirtImg.addEventListener('load', imageLoaded);
    armsImg.addEventListener('load', imageLoaded);
    if (shirtImg.complete) imageLoaded();
    if (armsImg.complete)  imageLoaded();

    // ── Find product ──
    var product = null;
    for (var i = 0; i < products.length; i++) {
      if (products[i].id === productId) { product = products[i]; break; }
    }

    var page = document.getElementById('productPage');

    if (!product) {
      page.innerHTML = '<p>Product not found. <a href="shop.html">Back to shop</a></p>';
    } else {
      document.title = product.name + ' — Duck & Cover';

      // Safe placement with fallback
      var pl = (product.placement && typeof product.placement.size !== 'undefined')
        ? product.placement
        : { size: 40, x: 30, y: 35 };

      var swatchHTML = '';
      SHIRT_COLORS.forEach(function(c) {
        swatchHTML += '<button'
          + ' class="color-swatch' + (c.hex === '#FFFFFF' ? ' active' : '') + '"'
          + ' style="background:' + c.hex + ';' + (c.hex === '#FFFFFF' ? 'border-color:#C0B8A8;' : '') + '"'
          + ' data-hex="' + c.hex + '"'
          + ' title="' + c.name + '"'
          + ' onclick="setShirtColor(\'' + c.hex + '\',\'' + c.name + '\')">'
          + '</button>';
      });

      var adminHTML = '';
      if (IS_ADMIN) {
        adminHTML = '<div class="admin-panel">'
          + '<div class="admin-title">🛠 Admin — ' + product.name + '</div>'
          + '<div class="admin-row"><label>Size: <strong id="labelSize">' + pl.size + '%</strong></label>'
          + '<input id="sliderSize" type="range" min="1" max="100" value="' + pl.size + '" oninput="updateDesign()" /></div>'
          + '<div class="admin-row"><label>X: <strong id="labelX">' + pl.x + '%</strong></label>'
          + '<input id="sliderX" type="range" min="0" max="90" value="' + pl.x + '" oninput="updateDesign()" /></div>'
          + '<div class="admin-row"><label>Y: <strong id="labelY">' + pl.y + '%</strong></label>'
          + '<input id="sliderY" type="range" min="0" max="90" value="' + pl.y + '" oninput="updateDesign()" /></div>'
          + '<div class="admin-output" id="adminOutput">placement: { size: ' + pl.size + ', x: ' + pl.x + ', y: ' + pl.y + ' }</div>'
          + '<button id="exportBtn" class="admin-export" onclick="exportUpdate(\'' + product.id + '\')">⬇ Export Update</button>'
          + '<div class="admin-hint">Downloads updated products.js — drop it in your project and push.</div>'
          + '</div>';
      }

      page.innerHTML = ''
        + '<div class="breadcrumb">'
        + '<a href="index.html">Home</a> / <a href="shop.html">Shop</a> / <span>' + product.name + '</span>'
        + '</div>'
        + '<div class="product-detail">'
        + '<div class="product-detail-img">'
        + '<div class="shirt-mockup">'
        + '<canvas id="shirtCanvas" class="shirt-canvas"></canvas>'
        + '<img id="shirtDesign" src="' + product.image + '" alt="' + product.name + '" class="shirt-design"'
        + ' style="width:' + pl.size + '%; left:' + pl.x + '%; top:' + pl.y + '%;" />'
        + '</div>'
        + adminHTML
        + '</div>'
        + '<div class="product-detail-info">'
        + '<h1>' + product.name + '</h1>'
        + '<div class="product-price">$' + product.price + '</div>'
        + '<p class="product-description">' + product.description + '</p>'
        + '<div class="color-picker-section">'
        + '<div class="color-picker-label">Shirt Color — <span id="colorLabel">White</span></div>'
        + '<div class="color-swatches">' + swatchHTML + '</div>'
        + '</div>'
        + '<div class="product-details-box">'
        + '<div class="detail-row">→ Hand-drawn original design</div>'
        + '<div class="detail-row">→ DTF transfer, pressed in-house</div>'
        + '<div class="detail-row">→ Bella+Canvas 3001 tee</div>'
        + '<div class="detail-row">→ Sizes: S, M, L, XL, 2XL</div>'
        + '</div>'
        + '<a href="' + product.stripeLink + '" class="btn btn-buy">Buy Now →</a>'
        + '<p class="buy-note">You\'ll be taken to Stripe\'s secure checkout.</p>'
        + '</div>'
        + '</div>';

      // Render mockup now that canvas exists
      if (imagesReady >= 2) renderMockup('#FFFFFF');

      // Related products
      var relGrid = document.getElementById('relatedGrid');
      products.forEach(function(p) {
        if (p.id === product.id) return;
        relGrid.innerHTML += '<a href="product.html?id=' + p.id + '" class="product-card">'
          + '<div class="card-img"><img src="' + p.image + '" alt="' + p.name + '" /></div>'
          + '<div class="card-info"><h3>' + p.name + '</h3><p>' + p.shortDescription + '</p>'
          + '<span class="price">$' + p.price + '</span></div></a>';
      });
    }
  </script>
</body>
</html>
