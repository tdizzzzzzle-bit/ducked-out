<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — Duck & Cover</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">
      <img src="Gerald.svg" alt="Duck & Cover" class="nav-duck" />
      <span>Duck & Cover</span>
    </a>
    <div class="nav-links">
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
    </div>
    <button class="nav-toggle" onclick="toggleNav()">☰</button>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <a href="shop.html" onclick="toggleNav()">Shop</a>
    <a href="about.html" onclick="toggleNav()">About</a>
  </div>

  <div class="container product-page" id="productPage">
    <p>Loading...</p>
  </div>

  <section class="related-section">
    <div class="container">
      <h2>More Like This</h2>
      <div class="product-grid" id="relatedGrid"></div>
    </div>
  </section>

  <footer>
    <div class="container footer-inner">
      <a href="index.html" class="footer-logo">Duck & Cover</a>
      <p>© <span id="year"></span> Duck & Cover. All ducks reserved.</p>
      <div class="footer-links">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
      </div>
    </div>
  </footer>

  <script src="products.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    function toggleNav() {
      document.getElementById('mobileMenu').classList.toggle('open');
    }

    var urlParams   = new URLSearchParams(window.location.search);
    var IS_ADMIN    = urlParams.get('admin') === 'quack';
    var productId   = urlParams.get('id');

    var uploadedFile     = null;
    var uploadedFileName = '';

    const SHIRT_COLORS = [
      // Whites & Naturals
      { name: 'White',             hex: '#FFFFFF' },
      { name: 'Natural',           hex: '#F2EDD7' },
      { name: 'Cornsilk',          hex: '#FFF5CC' },
      // Greys
      { name: 'Ice Grey',          hex: '#DCDCDC' },
      { name: 'Ash Grey',          hex: '#B5B2AE' },
      { name: 'Sport Grey',        hex: '#8E8E8E' },
      { name: 'Gravel',            hex: '#797979' },
      { name: 'Tweed',             hex: '#9E8E72' },
      { name: 'Graphite Heather',  hex: '#646464' },
      { name: 'Dark Heather',      hex: '#464646' },
      { name: 'Charcoal',          hex: '#3C3C3C' },
      // Black
      { name: 'Black',             hex: '#1C1C1C' },
      // Pinks & Reds
      { name: 'Light Pink',        hex: '#F9C5C9' },
      { name: 'Safety Pink',       hex: '#FF82A9' },
      { name: 'Azalea',            hex: '#F96680' },
      { name: 'Coral Silk',        hex: '#F47E72' },
      { name: 'Heliconia',         hex: '#E0226B' },
      { name: 'Heather Red',       hex: '#CC3333' },
      { name: 'Red',               hex: '#CC1818' },
      { name: 'Cardinal Red',      hex: '#BC1010' },
      { name: 'Antque Cherry Rd',  hex: '#83111B' },
      { name: 'Garnet',            hex: '#5C1A2E' },
      { name: 'Maroon',            hex: '#6B0F1A' },
      { name: 'Berry',             hex: '#7B1240' },
      { name: 'Blackberry',        hex: '#3E0E1C' },
      // Oranges
      { name: 'Sunset',            hex: '#FF8C42' },
      { name: 'Antique Orange',    hex: '#C16A2E' },
      { name: 'S Orange',          hex: '#F15A22' },
      { name: 'T Orange',          hex: '#FF6A00' },
      { name: 'Tennessee Orange',  hex: '#FF8200' },
      { name: 'Orange',            hex: '#FF6600' },
      // Yellows & Golds
      { name: 'Daisy',             hex: '#FAD13A' },
      { name: 'Yellow Haze',       hex: '#DFC96A' },
      { name: 'Old Gold',          hex: '#C9A84C' },
      { name: 'Gold',              hex: '#E8A820' },
      // Greens
      { name: 'Safety Green',      hex: '#78FF44' },
      { name: 'Electric Green',    hex: '#39E600' },
      { name: 'Neon Green',        hex: '#6FEE18' },
      { name: 'Lime',              hex: '#A8E53E' },
      { name: 'Kiwi',              hex: '#8DB33A' },
      { name: 'Mint Green',        hex: '#AAE8C0' },
      { name: 'Irish Green',       hex: '#009944' },
      { name: 'Antiq Irish Grn',   hex: '#006838' },
      { name: 'Turf Green',        hex: '#3E7D44' },
      { name: 'Forest Green',      hex: '#2D5A27' },
      { name: 'Hthr Militry Grn',  hex: '#636B4E' },
      { name: 'Military Green',    hex: '#506028' },
      { name: 'Antiqu Jade Dome',  hex: '#2E7D60' },
      // Blues
      { name: 'Neon Blue',         hex: '#1EB8FF' },
      { name: 'Sky',               hex: '#8EC9E8' },
      { name: 'Light Blue',        hex: '#6EB4D8' },
      { name: 'Tropical Blue',     hex: '#0082C4' },
      { name: 'Cobalt',            hex: '#1050A0' },
      { name: 'Heather Sapphire',  hex: '#4074A8' },
      { name: 'Royal',             hex: '#2850A0' },
      { name: 'Sapphire',          hex: '#1C5096' },
      { name: 'Antique Sapphire',  hex: '#3C5C78' },
      { name: 'Indigo Blue',       hex: '#304080' },
      { name: 'Heather Navy',      hex: '#2C3C60' },
      { name: 'Navy',              hex: '#1A2848' },
      { name: 'Midnight',          hex: '#141E32' },
      // Purples
      { name: 'Hthr Rdnt Orchid',  hex: '#A85CA0' },
      { name: 'Lilac',             hex: '#C098C8' },
      { name: 'Violet',            hex: '#7040A0' },
      { name: 'Purple',            hex: '#5020A0' },
      // Browns & Tans
      { name: 'Sand',              hex: '#C8B08C' },
      { name: 'Brown Savana',      hex: '#8C6030' },
      { name: 'Dark Chocolate',    hex: '#3C1C10' },
    ];

    var shirtImg = new Image();
    var armsImg  = new Image();
    shirtImg.src = 'model_shirt.png';
    armsImg.src  = 'model_arms.png';

    function hexToRgb(hex) {
      return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
    }

    function renderMockup(hex) {
      var canvas = document.getElementById('shirtCanvas');
      if (!canvas || !armsImg.naturalWidth) return;
      var ctx = canvas.getContext('2d');
      canvas.width  = armsImg.naturalWidth;
      canvas.height = armsImg.naturalHeight;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(armsImg, 0, 0, canvas.width, canvas.height);
      var off = document.createElement('canvas');
      off.width = shirtImg.naturalWidth;
      off.height = shirtImg.naturalHeight;
      var offCtx = off.getContext('2d');
      offCtx.drawImage(shirtImg, 0, 0);
      var imgData = offCtx.getImageData(0, 0, off.width, off.height);
      var d = imgData.data;
      var rgb = hexToRgb(hex);
      for (var i = 0; i < d.length; i += 4) {
        if (d[i+3] < 10) continue;
        var b = (d[i] + d[i+1] + d[i+2]) / (255 * 3);
        d[i]   = Math.min(255, Math.round(rgb[0] * b));
        d[i+1] = Math.min(255, Math.round(rgb[1] * b));
        d[i+2] = Math.min(255, Math.round(rgb[2] * b));
      }
      offCtx.putImageData(imgData, 0, 0);
      ctx.drawImage(off, 0, 0, canvas.width, canvas.height);
    }

    function setShirtColor(hex, name) {
      document.getElementById('colorLabel').textContent = name;
      document.querySelectorAll('.color-swatch').forEach(function(s) {
        s.classList.toggle('active', s.dataset.hex === hex);
      });
      renderMockup(hex);
    }

    function updateDesign() {
      var design = document.getElementById('shirtDesign');
      if (!design) return;
      var size = document.getElementById('sliderSize').value;
      var x    = document.getElementById('sliderX').value;
      var y    = document.getElementById('sliderY').value;
      design.style.width = size + '%';
      design.style.left  = x + '%';
      design.style.top   = y + '%';
      document.getElementById('labelSize').textContent = size + '%';
      document.getElementById('labelX').textContent    = x + '%';
      document.getElementById('labelY').textContent    = y + '%';
    }

    function handleImageUpload(input) {
      var file = input.files[0];
      if (!file) return;
      uploadedFile     = file;
      uploadedFileName = file.name;
      var reader = new FileReader();
      reader.onload = function(e) {
        var design = document.getElementById('shirtDesign');
        design.src = e.target.result;
        var dropText = document.getElementById('imageDropText');
        if (dropText) {
          dropText.innerHTML = '✓ <strong>' + file.name + '</strong><br><small>Click to change</small>';
          document.getElementById('imageDropZone').style.borderColor = '#2D5A27';
          document.getElementById('imageDropZone').style.background  = '#f0fff4';
        }
      };
      reader.readAsDataURL(file);
    }

    function serializeProducts(arr) {
      var rows = arr.map(function(p) {
        return '  {\n'
          + '    id: "' + p.id + '",\n'
          + '    name: "' + p.name.replace(/"/g, '\\"') + '",\n'
          + '    shortDescription: "' + p.shortDescription.replace(/"/g, '\\"') + '",\n'
          + '    description: "' + p.description.replace(/"/g, '\\"') + '",\n'
          + '    price: ' + p.price + ',\n'
          + '    image: "' + p.image + '",\n'
          + '    stripeLink: "' + p.stripeLink + '",\n'
          + '    placement: { size: ' + p.placement.size + ', x: ' + p.placement.x + ', y: ' + p.placement.y + ' },\n'
          + '  }';
      });
      return 'const products = [\n' + rows.join(',\n') + ',\n];\n';
    }

    async function exportUpdate(pid) {
      var size   = parseInt(document.getElementById('sliderSize').value);
      var x      = parseInt(document.getElementById('sliderX').value);
      var y      = parseInt(document.getElementById('sliderY').value);
      var name   = document.getElementById('editName').value.trim();
      var short  = document.getElementById('editShort').value.trim();
      var desc   = document.getElementById('editDesc').value.trim();
      var price  = parseFloat(document.getElementById('editPrice').value);
      var stripe = document.getElementById('editStripe').value.trim();
      var image  = uploadedFile ? uploadedFileName
                                : products.find(function(p){return p.id===pid;}).image;

      var updated = products.map(function(p) {
        if (p.id !== pid) return p;
        return {
          id:               p.id,
          name:             name   || p.name,
          shortDescription: short  || p.shortDescription,
          description:      desc   || p.description,
          price:            isNaN(price) ? p.price : price,
          image:            image,
          stripeLink:       stripe || p.stripeLink,
          placement:        { size: size, x: x, y: y },
        };
      });

      var zip = new JSZip();
      zip.file('products.js', serializeProducts(updated));

      if (uploadedFile) {
        var imgData = await new Promise(function(resolve, reject) {
          var reader = new FileReader();
          reader.onload  = function(e) { resolve(e.target.result); };
          reader.onerror = reject;
          reader.readAsArrayBuffer(uploadedFile);
        });
        zip.file(uploadedFileName, imgData);
      }

      var blob = await zip.generateAsync({ type: 'blob' });
      var url  = URL.createObjectURL(blob);
      var a    = document.createElement('a');
      a.href     = url;
      a.download = 'duck-update-' + pid + '.zip';
      a.click();
      URL.revokeObjectURL(url);

      var btn = document.getElementById('exportBtn');
      btn.textContent      = '✓ Downloaded!';
      btn.style.background = '#2D5A27';
      btn.style.color      = 'white';
      setTimeout(function() {
        btn.textContent      = '⬇ Export Update';
        btn.style.background = '';
        btn.style.color      = '';
      }, 2500);
    }

    var imagesReady = 0;
    function imageLoaded() {
      imagesReady++;
      if (imagesReady >= 2) renderMockup('#FFFFFF');
    }
    shirtImg.addEventListener('load', imageLoaded);
    armsImg.addEventListener('load',  imageLoaded);
    if (shirtImg.complete) imageLoaded();
    if (armsImg.complete)  imageLoaded();

    var product = null;
    for (var i = 0; i < products.length; i++) {
      if (products[i].id === productId) { product = products[i]; break; }
    }

    var page = document.getElementById('productPage');

    if (!product) {
      page.innerHTML = '<p>Product not found. <a href="shop.html">Back to shop</a></p>';
    } else {
      document.title = product.name + ' — Duck & Cover';
      var pl = (product.placement && typeof product.placement.size !== 'undefined')
        ? product.placement : { size: 40, x: 30, y: 35 };

      var swatchHTML = '';
      SHIRT_COLORS.forEach(function(c) {
        swatchHTML += '<button'
          + ' class="color-swatch' + (c.hex === '#FFFFFF' ? ' active' : '') + '"'
          + ' style="background:' + c.hex + ';' + (c.hex === '#FFFFFF' ? 'border-color:#C0B8A8;' : '') + '"'
          + ' data-hex="' + c.hex + '" title="' + c.name + '"'
          + ' onclick="setShirtColor(\'' + c.hex + '\',\'' + c.name + '\')">'
          + '</button>';
      });

      var adminHTML = '';
      if (IS_ADMIN) {
        adminHTML =
          // ── Position panel ──
          '<div class="admin-panel" style="margin-top:1rem;">'
          + '<div class="admin-title">🛠 Admin — ' + product.name + '</div>'
          + '<div class="admin-row"><label>Size: <strong id="labelSize">' + pl.size + '%</strong></label>'
          + '<input id="sliderSize" type="range" min="1" max="100" value="' + pl.size + '" oninput="updateDesign()" /></div>'
          + '<div class="admin-row"><label>X: <strong id="labelX">' + pl.x + '%</strong></label>'
          + '<input id="sliderX" type="range" min="0" max="90" value="' + pl.x + '" oninput="updateDesign()" /></div>'
          + '<div class="admin-row"><label>Y: <strong id="labelY">' + pl.y + '%</strong></label>'
          + '<input id="sliderY" type="range" min="0" max="90" value="' + pl.y + '" oninput="updateDesign()" /></div>'
          + '</div>'

          // ── Edit fields panel ──
          + '<div class="admin-panel" style="margin-top:0.75rem;">'
          + '<div class="admin-title">✏️ Edit Product Details</div>'

          + '<div class="form-group">'
          + '<label class="admin-field-label">Name</label>'
          + '<input class="admin-field-input" id="editName" type="text" value="' + product.name + '" />'
          + '</div>'

          + '<div class="form-group">'
          + '<label class="admin-field-label">Short Description</label>'
          + '<input class="admin-field-input" id="editShort" type="text" value="' + product.shortDescription.replace(/"/g, '&quot;') + '" />'
          + '</div>'

          + '<div class="form-group">'
          + '<label class="admin-field-label">Full Description</label>'
          + '<textarea class="admin-field-input admin-field-textarea" id="editDesc">' + product.description + '</textarea>'
          + '</div>'

          + '<div class="form-group">'
          + '<label class="admin-field-label">Price ($)</label>'
          + '<input class="admin-field-input" id="editPrice" type="number" value="' + product.price + '" step="1" min="1" />'
          + '</div>'

          + '<div class="form-group">'
          + '<label class="admin-field-label">Stripe Link</label>'
          + '<input class="admin-field-input" id="editStripe" type="text" value="' + product.stripeLink + '" />'
          + '</div>'

          + '<div class="form-group">'
          + '<label class="admin-field-label">Replace Image (optional)</label>'
          + '<div class="file-drop" id="imageDropZone" onclick="document.getElementById(\'imageInput\').click()">'
          + '<div id="imageDropText">Current: <strong>' + product.image + '</strong><br><small>Click to upload a new SVG or PNG</small></div>'
          + '<input id="imageInput" type="file" accept=".svg,.png" style="display:none" onchange="handleImageUpload(this)" />'
          + '</div>'
          + '</div>'

          + '<button id="exportBtn" class="admin-export" onclick="exportUpdate(\'' + product.id + '\')">'
          + '⬇ Export Update</button>'
          + '<div class="admin-hint" style="margin-top:0.5rem;">Downloads updated products.js (+ new image if changed). Drop in project folder and push.</div>'
          + '</div>';
      }

      page.innerHTML =
        '<div class="breadcrumb">'
        + '<a href="' + (IS_ADMIN ? 'shop.html?admin=quack' : 'shop.html') + '">← Shop</a>'
        + ' / <span>' + product.name + '</span>'
        + '</div>'
        + '<div class="product-detail">'

        // Left: mockup + admin controls
        + '<div class="product-detail-img">'
        + '<div class="shirt-mockup">'
        + '<canvas id="shirtCanvas" class="shirt-canvas"></canvas>'
        + '<img id="shirtDesign" src="' + product.image + '" alt="' + product.name + '" class="shirt-design"'
        + ' style="width:' + pl.size + '%; left:' + pl.x + '%; top:' + pl.y + '%;" />'
        + '</div>'
        + adminHTML
        + '</div>'

        // Right: product info
        + '<div class="product-detail-info">'
        + '<h1>' + product.name + '</h1>'
        + '<div class="product-price">$' + product.price + '</div>'
        + '<p class="product-description">' + product.description + '</p>'
        + '<div class="color-picker-section">'
        + '<div class="color-picker-label">Shirt Color — <span id="colorLabel">White</span></div>'
        + '<div class="color-swatches">' + swatchHTML + '</div>'
        + '</div>'
        + '<div class="product-details-box">'
        + '<div class="detail-row">→ Hand-drawn original design</div>'
        + '<div class="detail-row">→ DTF transfer, pressed in-house</div>'
        + '<div class="detail-row">→ Bella+Canvas 3001 tee</div>'
        + '<div class="detail-row">→ Sizes: S, M, L, XL, 2XL</div>'
        + '</div>'
        + '<a href="' + product.stripeLink + '" class="btn btn-buy">Buy Now →</a>'
        + '<p class="buy-note">You\'ll be taken to Stripe\'s secure checkout.</p>'
        + '</div>'
        + '</div>';

      if (imagesReady >= 2) renderMockup('#FFFFFF');

      var relGrid = document.getElementById('relatedGrid');
      products.forEach(function(p) {
        if (p.id === product.id) return;
        relGrid.innerHTML +=
          '<a href="product.html?id=' + p.id + (IS_ADMIN ? '&admin=quack' : '') + '" class="product-card">'
          + '<div class="card-img"><img src="' + p.image + '" alt="' + p.name + '" /></div>'
          + '<div class="card-info"><h3>' + p.name + '</h3><p>' + p.shortDescription + '</p>'
          + '<span class="price">$' + p.price + '</span></div></a>';
      });
    }
  </script>
</body>
</html>
